<div class="lore-graph-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b data-i18n="Lore Graph">Lore Graph</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label" for="lg_enable_extension">
                <input id="lg_enable_extension" type="checkbox" {{#if enableExtension}}checked{{/if}} />
                <span>Enable extension (overrides everything below)</span>
            </label>

            <label class="checkbox_label" for="lg_hardcore_mode">
                <input id="lg_hardcore_mode" type="checkbox" {{#if hardcoreMode}}checked{{/if}} />
                <span>Only activate constant lore entries (ignore all keywords)</span>
            </label>

            <hr class="lg-settings-divider" />

            <label class="checkbox_label" for="lg_tool_enabled">
                <input id="lg_tool_enabled" type="checkbox" {{#if toolEnabled}}checked{{/if}} />
                <span>Enable lookup_lore function tool</span>
            </label>
            <div class="lg-description-block">
                <textarea id="lg_lookup_description" rows="3">{{lookupToolDescription}}</textarea>
                <button type="button" class="menu_button lg-revert-btn" data-lg-revert="lookup">
                    Revert to default
                </button>
            </div>

            <label class="checkbox_label" for="lg_search_tool_enabled">
                <input id="lg_search_tool_enabled" type="checkbox" {{#if searchToolEnabled}}checked{{/if}} />
                <span>Enable search_lore function tool</span>
            </label>
            <div class="lg-description-block">
                <textarea id="lg_search_description" rows="3">{{searchToolDescription}}</textarea>
                <button type="button" class="menu_button lg-revert-btn" data-lg-revert="search">
                    Revert to default
                </button>
            </div>

            <label class="checkbox_label" for="lg_cross_book">
                <input id="lg_cross_book" type="checkbox" {{#if crossBookLookup}}checked{{/if}} />
                <span>Search across all active lorebooks</span>
            </label>
            <label class="checkbox_label" for="lg_strip_links">
                <input id="lg_strip_links" type="checkbox" {{#if stripLinksFromPrompt}}checked{{/if}} />
                <span>Strip link markup in prompts (show only text)</span>
            </label>
            <label class="checkbox_label" for="lg_stealth">
                <input id="lg_stealth" type="checkbox" {{#if stealth}}checked{{/if}} />
                <span>Hide tool call results from chat</span>
            </label>
        </div>
    </div>
</div>
